<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@700;900&amp;display=swap');
    </style>

    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d12"/>
      <stop offset="100%" style="stop-color:#080f17"/>
    </linearGradient>

    <!-- Scan beam gradient -->
    <linearGradient id="scanBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffe1;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#00ffe1;stop-opacity:0.15"/>
      <stop offset="60%" style="stop-color:#00ffe1;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#00ffe1;stop-opacity:0"/>
    </linearGradient>

    <!-- Glow filter for icon -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for text -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for scan beam -->
    <clipPath id="iconClip">
      <circle cx="90" cy="100" r="62"/>
    </clipPath>

    <!-- Radar sweep gradient -->
    <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffe1;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00ffe1;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#00ffe1" stroke-width="0.5">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="440" y1="0" x2="440" y2="200"/>
  </g>

  <!-- ═══ ICON: Radar/Scan circle ═══ -->

  <!-- Outer ring -->
  <circle cx="90" cy="100" r="62" fill="none" stroke="#00ffe1" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>

  <!-- Inner rings -->
  <circle cx="90" cy="100" r="46" fill="none" stroke="#00ffe1" stroke-width="0.8" opacity="0.25"/>
  <circle cx="90" cy="100" r="30" fill="none" stroke="#00ffe1" stroke-width="0.8" opacity="0.2"/>
  <circle cx="90" cy="100" r="14" fill="none" stroke="#00ffe1" stroke-width="0.8" opacity="0.2"/>

  <!-- Radar fill -->
  <circle cx="90" cy="100" r="62" fill="url(#radarGrad)"/>

  <!-- Crosshair lines -->
  <line x1="28" y1="100" x2="152" y2="100" stroke="#00ffe1" stroke-width="0.7" opacity="0.3"/>
  <line x1="90" y1="38" x2="90" y2="162" stroke="#00ffe1" stroke-width="0.7" opacity="0.3"/>

  <!-- Radar sweep (static wedge indicating 45° sweep) -->
  <path d="M90,100 L140,60 A62,62 0 0,1 150,100 Z" fill="#00ffe1" opacity="0.07" clip-path="url(#iconClip)"/>
  <line x1="90" y1="100" x2="140" y2="60" stroke="#00ffe1" stroke-width="1.2" opacity="0.6" filter="url(#glow)"/>

  <!-- Scan beam moving horizontal -->
  <rect x="28" y="85" width="124" height="30" fill="url(#scanBeam)" clip-path="url(#iconClip)" opacity="0.9"/>

  <!-- Center dot -->
  <circle cx="90" cy="100" r="3.5" fill="#00ffe1" opacity="0.9" filter="url(#glow)"/>

  <!-- Target blip dots -->
  <circle cx="118" cy="72" r="2.5" fill="#ff4e6a" opacity="0.9" filter="url(#glow)"/>
  <circle cx="68" cy="120" r="2" fill="#00ffe1" opacity="0.6"/>
  <circle cx="126" cy="108" r="1.5" fill="#ff4e6a" opacity="0.7" filter="url(#glow)"/>

  <!-- Corner tick marks on outer ring -->
  <line x1="28" y1="100" x2="36" y2="100" stroke="#00ffe1" stroke-width="2" opacity="0.7"/>
  <line x1="144" y1="100" x2="152" y2="100" stroke="#00ffe1" stroke-width="2" opacity="0.7"/>
  <line x1="90" y1="38" x2="90" y2="46" stroke="#00ffe1" stroke-width="2" opacity="0.7"/>
  <line x1="90" y1="154" x2="90" y2="162" stroke="#00ffe1" stroke-width="2" opacity="0.7"/>

  <!-- ═══ TEXT ═══ -->

  <!-- MCP in accent color -->
  <text
    x="175" y="96"
    font-family="'Orbitron', 'Share Tech Mono', monospace"
    font-size="48"
    font-weight="900"
    fill="#00ffe1"
    letter-spacing="2"
    filter="url(#textGlow)"
    opacity="0.95">MCP</text>

  <!-- SCAN in white -->
  <text
    x="177" y="144"
    font-family="'Orbitron', 'Share Tech Mono', monospace"
    font-size="48"
    font-weight="700"
    fill="#e8f8f5"
    letter-spacing="6"
    opacity="0.92">SCAN</text>

  <!-- Tagline -->
  <text
    x="177" y="166"
    font-family="'Share Tech Mono', 'Courier New', monospace"
    font-size="10.5"
    fill="#00ffe1"
    letter-spacing="3"
    opacity="0.45">OFFENSIVE MCP AUDITOR</text>

  <!-- Divider line between MCP and SCAN -->
  <line x1="175" y1="105" x2="435" y2="105" stroke="#00ffe1" stroke-width="0.6" opacity="0.2"/>

  <!-- Top-right version tag -->
  <text
    x="430" y="28"
    font-family="'Share Tech Mono', monospace"
    font-size="9"
    fill="#00ffe1"
    text-anchor="middle"
    opacity="0.3">v1.0</text>

  <!-- Corner brackets decoration -->
  <path d="M8,8 L8,24 M8,8 L24,8" stroke="#00ffe1" stroke-width="1.2" fill="none" opacity="0.35"/>
  <path d="M472,8 L472,24 M472,8 L456,8" stroke="#00ffe1" stroke-width="1.2" fill="none" opacity="0.35"/>
  <path d="M8,192 L8,176 M8,192 L24,192" stroke="#00ffe1" stroke-width="1.2" fill="none" opacity="0.35"/>
  <path d="M472,192 L472,176 M472,192 L456,192" stroke="#00ffe1" stroke-width="1.2" fill="none" opacity="0.35"/>
</svg>
